name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest

    env:
      SUPABASE_BASE: https://xtertgftujnebubxgqit.supabase.co/functions/v1
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZXJ0Z2Z0dWpuZWJ1YnhncWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMwMzEwNTUsImV4cCI6MjA3ODYwNzA1NX0.hmJLa5nkS9EM3LIRLrrDhsnbZqqoL4RCsve84Qtk8Hw

    steps:
      - name: Ping health endpoint
        id: health
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/health-response.json -w "%{http_code}" \
            --max-time 30 \
            -H "Authorization: Bearer $ANON_KEY" \
            "$SUPABASE_BASE/health")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Health check failed with status $HTTP_STATUS"
            cat /tmp/health-response.json || true
            exit 1
          fi

          echo "Health check passed (HTTP $HTTP_STATUS)"
          cat /tmp/health-response.json | python3 -m json.tool || true

      - name: Warm up critical edge functions
        if: success()
        run: |
          # Fire CORS preflights to warm Deno workers without triggering business logic.
          # These run in parallel and failures are non-blocking (warm-up is best-effort).
          for fn in nl-search notify-vacancy notify-application send-push delete-account public-opportunities; do
            curl -s -o /dev/null --max-time 10 -X OPTIONS \
              -H "Origin: https://inhockia.com" \
              -H "Access-Control-Request-Method: POST" \
              "$SUPABASE_BASE/$fn" &
          done
          wait
          echo "Warm-up pings sent for critical edge functions"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Uptime] Health check failed at ${new Date().toISOString()}`
            const body = [
              `The production health endpoint returned a non-200 status.`,
              ``,
              `**HTTP Status**: \`${{ steps.health.outputs.status || 'timeout/error' }}\``,
              `**Endpoint**: \`https://xtertgftujnebubxgqit.supabase.co/functions/v1/health\``,
              `**Time**: ${new Date().toISOString()}`,
              ``,
              `Please investigate immediately.`,
              ``,
              `_This issue was created automatically by the uptime monitor._`,
            ].join('\n')

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'uptime',
              state: 'open',
              per_page: 1,
            })

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing at ${new Date().toISOString()}. HTTP status: \`${{ steps.health.outputs.status || 'unknown' }}\``,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['uptime', 'bug'],
              })
            }
