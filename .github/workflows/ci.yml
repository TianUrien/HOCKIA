name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Dependency audit (production only)
        working-directory: ./client
        run: npm audit --omit=dev --audit-level=high

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run ESLint (zero warnings)
        working-directory: ./client
        run: npx eslint . --max-warnings=0

      - name: Run TypeScript type check
        working-directory: ./client
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ./client
        run: npm run test:unit:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./client/coverage
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build application
        working-directory: ./client
        env:
          # Provide dummy values for build (actual values come from Vercel)
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-build-verification
        run: npm run build

      - name: Bundle size budget
        working-directory: ./client
        run: |
          # ── Initial-load gzip budget (the metric that actually matters) ──
          # Budget the gzip of ONLY the chunks index.html eagerly loads (entry +
          # modulepreload) — what a player/coach/recruiter downloads on first
          # paint. Lazy route/admin chunks (recharts + the admin dashboards alone
          # are ~107KB gzip, plus every code-split page) are fetched ON DEMAND and
          # must NOT count. The old "sum all 125 chunks" gzip metric double-counted
          # ~486KB of never-on-first-load code and was the phantom "877/880KB
          # binding constraint" that drove the 850→880→900 bumps — chasing a
          # number that punished code-splitting. Investigated 2026-06-18: the
          # charts chunk is already lazy + admin-only; the eager set was 407KB gzip
          # when this metric replaced the all-chunks gate.
          EAGER_FILES=$(grep -oE 'assets/[a-zA-Z0-9_-]+\.js' dist/index.html | sort -u | sed 's#^#dist/#')
          EAGER_GZIP=$(cat $EAGER_FILES | gzip -c | wc -c)
          EAGER_KB=$((EAGER_GZIP / 1024))
          TOTAL_JS=$(cat dist/assets/*.js | wc -c)
          TOTAL_KB=$((TOTAL_JS / 1024))
          echo "Initial-load JS: ${EAGER_KB}KB gzip (eager chunks) | ${TOTAL_KB}KB raw across all chunks"

          # Early warning at ~94% of the 480KB initial-load budget
          if [ "$EAGER_GZIP" -gt 460800 ]; then
            echo "::warning::Initial-load bundle nearing budget: ${EAGER_KB}KB / 480KB ($(( EAGER_KB * 100 / 480 ))%)"
          fi

          # Primary gate: initial-load gzip must stay under 480KB. Features belong
          # in lazy route chunks (not the eager set), so this grows slowly; a rise
          # means something heavy leaked into the entry/shared graph — investigate
          # rather than bump.
          if [ "$EAGER_GZIP" -gt 491520 ]; then
            echo "::error::Initial-load bundle budget exceeded! ${EAGER_KB}KB > 480KB"
            exit 1
          fi

          # Early warning: raw at 90% of budget (3330KB)
          # Budget bumped 3200KB → 3300KB on 2026-05-27 — Phase 1
          # carousel rotation work pushed raw from ~3190KB to 3202KB.
          # Budget bumped 3300KB → 3400KB on 2026-05-29 — the App Store
          # readiness batch (FAB + Message in hero + Community intro
          # removal + context-aware back navigation + touch-target sweep
          # + invalid-conversation self-heal) AND the user-feedback MVP
          # (modal + hook + admin dashboard + edge fn + 4 new RPCs)
          # together added ~19KB raw, tipping the 3300 gate.
          # Budget bumped 3400KB → 3500KB on 2026-06-10 — the Community
          # recruiter-card upgrade (Phase 1 RecruiterMatchBar + percentile
          # ranking, Phase 2 expandable EvidenceSignal checklist) tipped
          # raw to 3401KB. gzip stays comfortably under its 880KB gate
          # (the delivery-relevant metric); the raw delta is our own
          # component code, no new dependency. ~100KB headroom restored.
          # Budget bumped 3500KB → 3600KB on 2026-06-16 — three weeks of
          # feature work (AI-opinion observability, admin sweeps, the
          # opportunities overlay, the image-perf Phases 0-3) ate the prior
          # ~100KB; Phase 3 Tranche 1's CLS/priority component code (no new
          # dependency) tipped raw just over 3500KB. NOTE (2026-06-18): the gzip
          # "binding constraint" was a MEASUREMENT bug, not bloat — recharts / the
          # admin charts are already lazy + admin-only. The gzip gate now budgets
          # the INITIAL load (above), so this raw 3.6MB all-chunks check is just
          # the remaining total-bloat backstop (catches a heavy dep even in a lazy
          # chunk); it is no longer the binding constraint.
          # Budget bumped 3600KB → 3700KB on 2026-07-08 — P6 campaign
          # instrumentation (acquisition-capture lib + the week-2 cohort
          # admin dashboard + median-response admin RPCs) tipped raw to
          # 3603KB. All of it is lazy admin-route component code, no new
          # dependency; the initial-load gzip gate stays healthy at
          # 412KB/480KB (the delivery-relevant metric), so only this
          # total-bloat backstop moved. ~97KB headroom restored.
          if [ "$TOTAL_JS" -gt 3409920 ]; then
            echo "::warning::Bundle nearing raw budget: ${TOTAL_KB}KB / 3700KB ($(( TOTAL_KB * 100 / 3700 ))%)"
          fi

          # Secondary gate: raw total must stay under 3.7MB
          if [ "$TOTAL_JS" -gt 3788800 ]; then
            echo "::error::Raw bundle budget exceeded! ${TOTAL_KB}KB > 3700KB"
            exit 1
          fi

          # Warn on individual chunks > 512KB (raw)
          for f in dist/assets/*.js; do
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt 524288 ]; then
              echo "::warning::Large chunk: $(basename "$f") is $((SIZE / 1024))KB (> 512KB)"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: client/dist
          retention-days: 7

  migration-check:
    name: Migration Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (was `latest`). `latest` calls the GitHub releases
          # API on every run, which is shared-IP rate-limited from
          # Actions runners — we hit "rate limit exceeded" twice in
          # late May 2026 and lost CI runs to it. Pin to the version
          # the project's local dev uses; bump deliberately when CLI
          # features the migration flow needs change.
          version: 2.67.1

      - name: Link Supabase project
        run: supabase link --project-ref ivjkdaylalhsteyyclvl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Validate migrations (dry-run)
        # Strict check for staging + PRs: local files and the staging DB's
        # migration history must reconcile exactly.
        if: github.ref_name != 'main'
        run: supabase db push --linked --dry-run --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Validate migrations (main — tolerate staging-ahead)
        # main is routinely BEHIND staging (staging-first deploys; selective
        # prod pushes like the 2026-07-12 age-gate). The strict dry-run fails
        # on remote-ahead ("Remote migration versions not found in local
        # migrations directory") — a false positive that turns every selective
        # prod push red. On main, assert the invariant that actually matters:
        # every migration file on main has already been applied to the staging
        # DB (nothing may reach main without passing through staging first).
        # Staging having EXTRA migrations is the expected steady state.
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          listing=$(supabase migration list --linked)
          echo "$listing"
          failed=0
          for f in supabase/migrations/*.sql; do
            v=$(basename "$f" | grep -oE '^[0-9]+')
            # REMOTE is the middle column: "| <version> |"
            if ! echo "$listing" | grep -qE "\|[[:space:]]*${v}[[:space:]]*\|"; then
              echo "::error::migration $v exists on main but was never applied to the staging DB"
              failed=1
            fi
          done
          exit $failed
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  db-tests:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    # Only run when secrets are available (not on forks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    # Serialize across concurrent runs (the main + staging double-push) so two runs
    # never mutate the SHARED staging-DB fixtures at once — the cause of the flaky
    # "duplicate key ... profile_friendships_pair_unique" failures. Constant group
    # (not ref-scoped) so main, staging and PR runs all queue behind one another;
    # cancel-in-progress:false because we want BOTH branches' runs to complete, just
    # not overlap. Non-DB jobs (lint/build/unit) stay fully parallel.
    concurrency:
      group: staging-db-tests
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run DB integration tests
        working-directory: ./client
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_CLUB_EMAIL: ${{ secrets.E2E_CLUB_EMAIL }}
          E2E_CLUB_PASSWORD: ${{ secrets.E2E_CLUB_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_BRAND_EMAIL: ${{ secrets.E2E_BRAND_EMAIL }}
          E2E_BRAND_PASSWORD: ${{ secrets.E2E_BRAND_PASSWORD }}
          E2E_UMPIRE_EMAIL: ${{ secrets.E2E_UMPIRE_EMAIL }}
          E2E_UMPIRE_PASSWORD: ${{ secrets.E2E_UMPIRE_PASSWORD }}
        run: npm run test:db

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Only run E2E tests if secrets are available (not on forks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    # Same rationale as db-tests: the smoke suite writes to the shared staging DB
    # (E2E_ALLOW_WRITES=1), so serialize across runs. Its OWN group (not shared with
    # db-tests) so the two never deadlock on GitHub's one-pending-per-group rule.
    concurrency:
      group: staging-e2e-tests
      cancel-in-progress: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Create env file for E2E tests
        working-directory: ./client
        env:
          # E2E tests run against STAGING (never production!)
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          E2E_ALLOW_WRITES: '1'
          E2E_ALLOWED_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_CLUB_EMAIL: ${{ secrets.E2E_CLUB_EMAIL }}
          E2E_CLUB_PASSWORD: ${{ secrets.E2E_CLUB_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_BRAND_EMAIL: ${{ secrets.E2E_BRAND_EMAIL }}
          E2E_BRAND_PASSWORD: ${{ secrets.E2E_BRAND_PASSWORD }}
          E2E_UMPIRE_EMAIL: ${{ secrets.E2E_UMPIRE_EMAIL }}
          E2E_UMPIRE_PASSWORD: ${{ secrets.E2E_UMPIRE_PASSWORD }}
        run: |
          echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" >> .env
          echo "E2E_ALLOW_WRITES=${E2E_ALLOW_WRITES}" >> .env
          echo "E2E_ALLOWED_SUPABASE_URL=${E2E_ALLOWED_SUPABASE_URL}" >> .env
          echo "E2E_PLAYER_EMAIL=${E2E_PLAYER_EMAIL}" >> .env
          echo "E2E_PLAYER_PASSWORD=${E2E_PLAYER_PASSWORD}" >> .env
          echo "E2E_CLUB_EMAIL=${E2E_CLUB_EMAIL}" >> .env
          echo "E2E_CLUB_PASSWORD=${E2E_CLUB_PASSWORD}" >> .env
          echo "E2E_COACH_EMAIL=${E2E_COACH_EMAIL}" >> .env
          echo "E2E_COACH_PASSWORD=${E2E_COACH_PASSWORD}" >> .env
          echo "E2E_BRAND_EMAIL=${E2E_BRAND_EMAIL}" >> .env
          echo "E2E_BRAND_PASSWORD=${E2E_BRAND_PASSWORD}" >> .env
          echo "E2E_UMPIRE_EMAIL=${E2E_UMPIRE_EMAIL}" >> .env
          echo "E2E_UMPIRE_PASSWORD=${E2E_UMPIRE_PASSWORD}" >> .env
          # Also create root .env.local for Supabase config
          echo "SUPABASE_URL=${VITE_SUPABASE_URL}" >> ../.env.local
          echo "SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" >> ../.env.local
          # Debug: show env file was created (without secrets)
          echo "Created .env with $(wc -l < .env) lines"
          echo "⚠️  E2E tests running against STAGING: ${VITE_SUPABASE_URL}"

      - name: Run E2E tests
        working-directory: ./client
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: client/test-results
          retention-days: 7
